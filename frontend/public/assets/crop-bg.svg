<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f4f4"/>
    </linearGradient>

    <linearGradient id="fieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8efe1"/>
      <stop offset="100%" stop-color="#b7e0c5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bgGrad)" />

  <!-- Rolling fields -->
  <path d="M0 520 C 300 480, 600 560, 900 520 C 1200 480, 1400 540, 1600 510 L1600 900 L0 900 Z"
        fill="url(#fieldGrad)" opacity="0.35"/>

  <path d="M0 600 C 400 560, 800 640, 1200 610 C 1450 590, 1600 630, 1600 630 L1600 900 L0 900 Z"
        fill="#9fd3b8" opacity="0.25"/>

  <!-- Crop lines -->
  <g stroke="#6aa88a" stroke-width="2" opacity="0.15">
    <line x1="0" y1="650" x2="1600" y2="650"/>
    <line x1="0" y1="700" x2="1600" y2="700"/>
    <line x1="0" y1="750" x2="1600" y2="750"/>
  </g>
</svg>
