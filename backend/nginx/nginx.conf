# ─── NGINX reverse proxy config ────────────────────────────────────────────
# Handles SSL termination, gzip, rate limiting, and proxies to Spring Boot.
# Replace "your-domain.com" with your actual backend domain on Render.

worker_processes auto;
events { worker_connections 1024; }

http {

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/xml text/css;
    gzip_min_length 1024;
    gzip_proxied any;

    # ── Rate limiting zone ─────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # ── Upstream ───────────────────────────────────────────────────────────
    upstream backend {
        server app:8080;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ───────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name your-domain.com;   # ← replace with your Render backend domain

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ── Security headers ───────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    nosniff always;
        add_header X-Frame-Options           SAMEORIGIN always;
        add_header X-XSS-Protection          "1; mode=block" always;

        # ── API proxy ──────────────────────────────────────────────────────
        location /api/ {

            # ── CORS preflight (OPTIONS) ───────────────────────────────────
            # Browsers send a preflight before every credentialed POST/PUT.
            # nginx must respond 204 directly — do NOT proxy OPTIONS to the
            # backend, otherwise the Spring CORS filter and nginx both try to
            # set Access-Control-Allow-Origin and the browser sees duplicate
            # headers, which is treated as a CORS failure.
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'      'https://harvest-box-chi.vercel.app' always;
                add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, Accept' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age'           3600 always;
                add_header 'Content-Length' 0;
                return 204;
            }

            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Generous timeout for ML inference calls (cold-start can take 90 s)
            proxy_read_timeout 130s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 130s;
        }

        # ── Swagger UI ─────────────────────────────────────────────────────
        # Remove these two blocks if you want to hide API docs in production.
        location /swagger-ui/ {
            proxy_pass http://backend;
        }
        location /api-docs {
            proxy_pass http://backend;
        }

        # ── Health (no rate limit, no CORS needed — internal use) ──────────
        location /actuator/health {
            proxy_pass http://backend;
        }
    }
}