# ─── DEV PROFILE ────────────────────────────────────────────────
# Uses file-based H2 — zero setup, persists locally.

spring:
  datasource:
    url: jdbc:h2:file:./data/harvest-box-db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

aws:
  region: ${AWS_DEFAULT_REGION:ap-south-1}
  s3:
    bucket: ${S3_BUCKET:harvest-box-bucket}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}

jwt:
  secret: ${JWT_SECRET}
  expiry-ms: 604800000   # 7 days

ml:
  base-url: ${ML_BASE_URL:http://localhost:8000}

# Weather API key — used by WeatherController proxy (never sent to frontend)
weather:
  api-key: ${WEATHER_API_KEY}

logging:
  level:
    com.capstone.project: DEBUG
    org.springframework.web: INFO
