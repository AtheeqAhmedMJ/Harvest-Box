# ─── PROD PROFILE ────────────────────────────────────────────────────────────
# ALL secrets come from environment variables — never hardcoded.
# Set SPRING_PROFILES_ACTIVE=prod in Render's environment settings.

spring:

  lifecycle:
    timeout-per-shutdown-phase: 20s

  datasource:
    url:      ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 300000
      connection-timeout: 20000
      keepalive-time: 60000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    # Disabled — migrations V1 and V2 were applied manually via Supabase SQL editor.
    # Supabase's transaction pooler (port 6543) does not support the DDL transactions
    # Flyway needs, and the session pooler (port 5432) times out from Render free tier.
    # The flyway_schema_history table in Supabase already tracks both migrations.
    # To run future migrations: apply them manually in Supabase SQL editor, then
    # insert a row into flyway_schema_history to keep the history in sync.
    enabled: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: ${PORT:8080}
  shutdown: graceful
  tomcat:
    threads:
      max: 20
      min-spare: 2
    accept-count: 50

aws:
  region: ${AWS_REGION:ap-south-1}
  s3:
    bucket: ${S3_BUCKET}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}

jwt:
  secret:    ${JWT_SECRET}
  expiry-ms: ${JWT_EXPIRY_MS:604800000}

ml:
  base-url:           ${ML_BASE_URL}
  connect-timeout-ms: ${ML_CONNECT_TIMEOUT_MS:60000}
  read-timeout-ms:    ${ML_READ_TIMEOUT_MS:120000}

weather:
  api-key: ${WEATHER_API_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.capstone.project: INFO
    org.springframework:  WARN
    com.zaxxer.hikari:    WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"