# ─── PROD PROFILE ────────────────────────────────────────────────────────────
# ALL secrets come from environment variables — never hardcoded.
# Set SPRING_PROFILES_ACTIVE=prod in Render's environment settings.

spring:

  lifecycle:
    timeout-per-shutdown-phase: 20s

  datasource:
    url:      ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Supabase free tier closes idle connections after ~5 min.
      # These settings keep the pool alive and validate before use.
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 180000          # 3 min — return idle connections before Supabase kills them
      connection-timeout: 20000     # 20 s — fail fast if pool is exhausted
      keepalive-time: 60000         # ping every 60 s to keep connections alive
      max-lifetime: 300000          # 5 min — recycle connections before Supabase drops them
      leak-detection-threshold: 60000
      # Validate connection before handing to app — catches stale connections
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: ${PORT:8080}
  shutdown: graceful
  tomcat:
    threads:
      max: 20
      min-spare: 2
    accept-count: 50

aws:
  region: ${AWS_REGION:ap-south-1}
  s3:
    bucket: ${S3_BUCKET}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}

jwt:
  secret:    ${JWT_SECRET}
  expiry-ms: ${JWT_EXPIRY_MS:604800000}

ml:
  base-url:           ${ML_BASE_URL}
  connect-timeout-ms: ${ML_CONNECT_TIMEOUT_MS:60000}
  read-timeout-ms:    ${ML_READ_TIMEOUT_MS:120000}

weather:
  api-key: ${WEATHER_API_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.capstone.project: INFO
    org.springframework:  WARN
    com.zaxxer.hikari:    WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"