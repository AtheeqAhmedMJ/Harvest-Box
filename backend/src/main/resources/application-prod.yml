# ─── PROD PROFILE ───────────────────────────────────────────────
# ALL secrets come from environment variables — never hardcoded.
# Set SPRING_PROFILES_ACTIVE=prod in your deployment environment.

spring:
  datasource:
    # ✅ updated comment (harvest_box)
    url: ${DB_URL}               # e.g. jdbc:postgresql://host:5432/harvest_box
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

aws:
  region: ${AWS_REGION:ap-south-1}
  s3:
    bucket: ${S3_BUCKET}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}

jwt:
  secret: ${JWT_SECRET}
  expiry-ms: ${JWT_EXPIRY_MS:604800000}

ml:
  base-url: ${ML_BASE_URL}

logging:
  level:
    com.capstone.project: INFO
    org.springframework: WARN

  # ✅ renamed log path
  file:
    name: /var/log/harvest-box/app.log
# Weather proxy — server-side key, never exposed to frontend
weather:
  api-key: ${WEATHER_API_KEY}
