spring:
  application:
    name: harvest-box

  # Do NOT set spring.profiles.active here.
  # Active profile is injected at runtime:
  #   - Render/prod: -Dspring.profiles.active=prod  (set in Dockerfile JAVA_OPTS)
  #   - Local dev:   SPRING_PROFILES_ACTIVE=dev in your shell or .env
  # Hardcoding it here overrides those and breaks prod deployments.

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  cache:
    type: simple

  jpa:
    open-in-view: false

server:
  port: 8080
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/plain
    min-response-size: 1024

spring.lifecycle:
  timeout-per-shutdown-phase: 20s

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

aws:
  region: ${AWS_REGION:ap-south-1}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}

s3:
  bucket: ${S3_BUCKET}