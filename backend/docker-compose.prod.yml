version: "3.9"

# ─── Harvest Box — Production stack ────────────────────────────────────────
#
# Database: Supabase (external) — the local postgres service has been removed.
#           Your DB_URL already points to Supabase; running a local postgres
#           container alongside it wastes Render's free-tier RAM for nothing.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# All secrets MUST come from environment variables or a .env file.
# Never commit .env to git.
#
# Render tip: set every variable below in the Render dashboard
# (Environment → Add Environment Variable) instead of using .env on disk.

services:

  # ── Spring Boot app ─────────────────────────────────────────────────────
  app:
    build: .
    container_name: harvest-box-app
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      # ── Spring ────────────────────────────────────────────────────────
      SPRING_PROFILES_ACTIVE: prod
      PORT: ${PORT:-8080}

      # ── Database (Supabase) ────────────────────────────────────────────
      # DB_URL must include ?sslmode=require for Supabase connections.
      # Example: jdbc:postgresql://db.xxx.supabase.co:5432/postgres?sslmode=require
      DB_URL:      ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      # ── JWT ───────────────────────────────────────────────────────────
      JWT_SECRET:    ${JWT_SECRET}
      JWT_EXPIRY_MS: ${JWT_EXPIRY_MS:-604800000}

      # ── Email (Gmail SMTP) ────────────────────────────────────────────
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

      # ── AWS S3 ────────────────────────────────────────────────────────
      AWS_REGION:            ${AWS_REGION:-ap-south-1}
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET:             ${S3_BUCKET}

      # ── ML service (Render free tier — allow long cold-start) ─────────
      ML_BASE_URL:           ${ML_BASE_URL}
      ML_CONNECT_TIMEOUT_MS: ${ML_CONNECT_TIMEOUT_MS:-60000}
      ML_READ_TIMEOUT_MS:    ${ML_READ_TIMEOUT_MS:-120000}

      # ── CORS ──────────────────────────────────────────────────────────
      # Set to your exact Vercel URL, no trailing slash.
      # Example: https://harvest-box-chi.vercel.app
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}

      # ── Weather ───────────────────────────────────────────────────────
      WEATHER_API_KEY: ${WEATHER_API_KEY}

    restart: unless-stopped
    networks:
      - harvest-box-net

  # ── NGINX reverse proxy ─────────────────────────────────────────────────
  # Only needed if you're self-hosting with a custom domain + SSL.
  # On Render's managed service, Render handles SSL termination for you —
  # in that case you can remove this service entirely.
  nginx:
    image: nginx:alpine
    container_name: harvest-box-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - harvest-box-net

networks:
  harvest-box-net:
    driver: bridge