name: CI — Build, Test & Docker

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and run tests
        run: ./mvnw verify -Dspring.profiles.active=dev
        env:
          # Dummy secrets so context loads in CI
          JWT_SECRET: ci_test_secret_at_least_32_chars_long
          AWS_ACCESS_KEY_ID: FAKE
          AWS_SECRET_ACCESS_KEY: FAKE
          S3_BUCKET: fake-bucket
          MAIL_USERNAME: ci@example.com
          MAIL_PASSWORD: fake

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

  docker-build:
    name: Docker Build (smoke test)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t agripulse:${{ github.sha }} .

      # Uncomment to push to Docker Hub / GHCR:
      # - name: Push to registry
      #   run: |
      #     echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      #     docker tag agripulse:${{ github.sha }} youruser/agripulse:latest
      #     docker push youruser/agripulse:latest
